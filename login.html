<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onixera Technologies | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="login-body">
    <main class="login-main section-reveal">
      <a class="back-link" href="./index.html">← Back to Home</a>
      <section class="login-card">
        <a class="brand login-brand" href="./index.html" aria-label="Onixera Technologies home">
          <img
            class="brand-logo"
            src="./assets/light.png"
            alt="Onixera Technologies logo"
            onerror="this.style.display='none';this.parentElement.querySelector('.brand-mark').style.display='grid';"
          />
          <span class="brand-mark" style="display: none">O</span>
          <span class="brand-text">Onixera Technologies</span>
        </a>
        <p class="eyebrow">Secure Access</p>
        <h1>Sign in to Onixera</h1>
        <p>Use your account credentials to continue.</p>

        <form id="login-form" class="login-form" novalidate>
          <label>
            Email Address
            <input type="email" id="login-email" required />
          </label>
          <label>
            Password
            <input type="password" id="login-password" minlength="6" required />
          </label>
          <button type="submit" class="btn btn-solid full-width">Sign In</button>
        </form>

        <button id="google-login" class="btn btn-outline full-width" type="button">
          Sign In with Google
        </button>

        <p class="switch-auth">
          New here?
          <button id="create-account" type="button">Create account</button>
        </p>
        <p id="auth-status" class="form-status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
